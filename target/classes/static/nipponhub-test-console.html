<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nipponhub API Tester • Frontend complet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .response-json { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        .tab-active { border-bottom: 3px solid #e11d48; color: #e11d48; }
        textarea, input, select { color: #f4f4f5; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-rose-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">N</div>
                    <div>
                        <h1 class="text-3xl font-semibold tracking-tight">Nipponhub</h1>
                        <p class="text-xs text-zinc-500 -mt-1">API Tester v2.0</p>
                    </div>
                </div>
            </div>

            <!-- Token status -->
            <div id="token-status" class="mx-4 mt-4 p-4 bg-zinc-800 rounded-3xl text-sm">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-circle text-red-400" id="token-dot"></i>
                        <span id="token-text" class="font-medium">Déconnecté</span>
                    </div>
                    <button onclick="logout()"
                            class="text-xs px-3 py-1 bg-zinc-700 hover:bg-rose-600 rounded-2xl transition-colors">
                        Déconnexion
                    </button>
                </div>
                <div id="user-info" class="mt-3 text-xs text-zinc-400 hidden">
                    <div id="current-user-name"></div>
                    <div id="current-user-role" class="inline-block px-2 py-px bg-amber-500 text-white rounded-xl text-[10px] mt-1"></div>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 overflow-y-auto px-3 py-6 space-y-1">
                <a onclick="setActiveTab(0)" class="tab flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 text-sm font-medium cursor-pointer tab-active" id="tab-0">
                    <i class="fa-solid fa-right-to-bracket w-5"></i>
                    Authentification
                </a>
                <a onclick="setActiveTab(1)" class="tab flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 text-sm font-medium cursor-pointer" id="tab-1">
                    <i class="fa-solid fa-users w-5"></i>
                    Utilisateurs
                </a>
                <a onclick="setActiveTab(2)" class="tab flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 text-sm font-medium cursor-pointer" id="tab-2">
                    <i class="fa-solid fa-box w-5"></i>
                    Produits
                </a>
                <a onclick="setActiveTab(3)" class="tab flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 text-sm font-medium cursor-pointer" id="tab-3">
                    <i class="fa-solid fa-tags w-5"></i>
                    Catégories
                </a>
                <a onclick="setActiveTab(4)" class="tab flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 text-sm font-medium cursor-pointer" id="tab-4">
                    <i class="fa-solid fa-globe w-5"></i>
                    Pays
                </a>
                <a onclick="setActiveTab(5)" class="tab flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 text-sm font-medium cursor-pointer" id="tab-5">
                    <i class="fa-solid fa-images w-5"></i>
                    Fichiers / Images
                </a>
                <a onclick="setActiveTab(6)" class="tab flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 text-sm font-medium cursor-pointer" id="tab-6">
                    <i class="fa-solid fa-cart-plus w-5"></i>
                    Achats
                </a>
                <a onclick="setActiveTab(7)" class="tab flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 text-sm font-medium cursor-pointer" id="tab-7">
                    <i class="fa-solid fa-receipt w-5"></i>
                    Ventes
                </a>
            </nav>

            <div class="p-4 border-t border-zinc-800 text-xs text-zinc-500 flex items-center gap-2">
                <div class="flex-1">Backend :</div>
                <div class="font-mono bg-zinc-800 px-2 py-1 rounded-2xl">http://localhost:8080</div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="h-14 border-b border-zinc-800 bg-zinc-900 px-8 flex items-center justify-between">
                <div id="page-title" class="text-2xl font-semibold">Authentification</div>

                <div class="flex items-center gap-4">
                    <div onclick="copyToken()" class="flex items-center gap-2 cursor-pointer text-sm bg-zinc-800 hover:bg-zinc-700 px-4 h-9 rounded-3xl">
                        <i class="fa-solid fa-copy"></i>
                        <span id="token-short" class="font-mono">—</span>
                    </div>
                    <button onclick="setActiveTab(0)" class="flex items-center gap-2 text-zinc-400 hover:text-white transition-colors">
                        <i class="fa-solid fa-book"></i>
                        <span class="text-sm">Documentation</span>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div id="content" class="flex-1 overflow-auto p-8 bg-zinc-950">
                <!-- All tabs will be injected here by JS -->
            </div>
        </div>

        <!-- RIGHT PANEL : RESPONSE -->
        <div class="w-96 border-l border-zinc-800 bg-zinc-900 flex flex-col">
            <div class="px-6 py-4 border-b border-zinc-800 font-medium flex items-center justify-between">
                <span>Réponse de l'API</span>
                <button onclick="clearResponse()" class="text-xs px-3 py-1 text-zinc-400 hover:text-white">Effacer</button>
            </div>

            <div id="response-panel" class="flex-1 p-6 overflow-auto">
                <div id="response-empty" class="h-full flex flex-col items-center justify-center text-center text-zinc-500">
                    <i class="fa-solid fa-paper-plane text-4xl mb-4 opacity-30"></i>
                    <p class="text-sm">Aucune requête envoyée</p>
                    <p class="text-xs mt-2">Les réponses apparaîtront ici</p>
                </div>

                <div id="response-content" class="hidden">
                    <div class="flex items-center gap-2 mb-4">
                        <div id="response-status" class="px-3 py-1 text-xs font-mono rounded-3xl"></div>
                        <div id="response-time" class="text-xs text-zinc-400"></div>
                        <div id="response-method" class="text-xs text-zinc-500 font-mono ml-auto"></div>
                    </div>
                    <pre id="response-json" class="response-json text-xs bg-black/60 p-4 rounded-3xl overflow-auto max-h-[calc(100vh-180px)] text-emerald-300"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const BASE_URL = "http://localhost:8080";
        let currentToken = localStorage.getItem("nipponhub_token") || null;
        let currentRefreshToken = localStorage.getItem("nipponhub_refresh") || null;
        let currentUser = null;
        let activeTab = 0;

        // ==================== UTILS ====================
        function updateTokenUI() {
            const dot = document.getElementById("token-dot");
            const text = document.getElementById("token-text");
            const short = document.getElementById("token-short");
            const userInfo = document.getElementById("user-info");

            if (currentToken) {
                dot.classList.remove("text-red-400");
                dot.classList.add("text-emerald-400");
                text.textContent = "Connecté";
                short.textContent = currentToken.substring(0, 12) + "...";
                userInfo.classList.remove("hidden");
                if (currentUser) {
                    document.getElementById("current-user-name").innerHTML =
                        `<i class="fa-solid fa-user mr-1"></i> ${currentUser.name || currentUser.email || ""}`;
                    document.getElementById("current-user-role").textContent = currentUser.role || "USER";
                }
            } else {
                dot.classList.remove("text-emerald-400");
                dot.classList.add("text-red-400");
                text.textContent = "Déconnecté";
                short.textContent = "—";
                userInfo.classList.add("hidden");
            }
        }

        function saveToken(token, refresh) {
            currentToken = token;
            currentRefreshToken = refresh;
            localStorage.setItem("nipponhub_token", token);
            if (refresh) localStorage.setItem("nipponhub_refresh", refresh);
            updateTokenUI();
        }

        function logout() {
            currentToken = null;
            currentRefreshToken = null;
            currentUser = null;
            localStorage.removeItem("nipponhub_token");
            localStorage.removeItem("nipponhub_refresh");
            updateTokenUI();
            setActiveTab(0);
            showResponse({ message: "Déconnecté avec succès" }, 200, 0, "LOCAL");
        }

        function copyToken() {
            if (!currentToken) return;
            navigator.clipboard.writeText(currentToken).then(() => {
                const el = document.getElementById("token-short");
                const orig = el.textContent;
                el.textContent = "Copié !";
                setTimeout(() => el.textContent = orig, 1500);
            });
        }

        function showResponse(data, status = 200, time = 0, method = "") {
            const empty = document.getElementById("response-empty");
            const content = document.getElementById("response-content");
            const jsonEl = document.getElementById("response-json");
            const statusEl = document.getElementById("response-status");
            const timeEl = document.getElementById("response-time");
            const methodEl = document.getElementById("response-method");

            empty.classList.add("hidden");
            content.classList.remove("hidden");

            const isOk = status >= 200 && status < 300;
            statusEl.innerHTML = `
                <span class="${isOk ? 'bg-emerald-500' : 'bg-rose-500'} text-white px-3 py-1 rounded-3xl text-xs font-medium">
                    ${status || "ERR"}
                </span>`;
            timeEl.textContent = time ? time + " ms" : "";
            methodEl.textContent = method;
            jsonEl.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
        }

        function clearResponse() {
            document.getElementById("response-empty").classList.remove("hidden");
            document.getElementById("response-content").classList.add("hidden");
        }

        async function apiCall(endpoint, options = {}) {
            const start = Date.now();
            const url = BASE_URL + endpoint;
            const headers = { ...options.headers };
            const method = options.method || "GET";

            const isPublic = endpoint.startsWith("/auth/") || endpoint.startsWith("/file/");
            if (currentToken && !isPublic) {
                headers["Authorization"] = `Bearer ${currentToken}`;
            }
            if (!(options.body instanceof FormData)) {
                headers["Content-Type"] = "application/json";
            }

            try {
                const res = await fetch(url, {
                    method,
                    headers: Object.keys(headers).length ? headers : undefined,
                    body: options.body
                });

                let data;
                const ct = res.headers.get("content-type") || "";
                if (ct.includes("application/json")) {
                    data = await res.json();
                } else if (ct.includes("image/")) {
                    data = { message: "Image reçue (binaire)", url };
                } else {
                    data = await res.text();
                }

                const duration = Date.now() - start;
                showResponse(data, res.status, duration, method);

                if (res.status === 401 && currentRefreshToken && endpoint !== "/auth/refresh") {
                    await refreshToken();
                }
                return { data, status: res.status };
            } catch (err) {
                showResponse({ error: err.message }, 0, Date.now() - start, method);
                return { error: err.message };
            }
        }

        async function refreshToken() {
            if (!currentRefreshToken) return;
            const { data } = await apiCall("/auth/refresh", {
                method: "POST",
                body: JSON.stringify({ token: currentRefreshToken })
            });
            if (data && data.token) {
                saveToken(data.token, data.refreshToken || currentRefreshToken);
            }
        }

        function setActiveTab(tabIndex) {
            activeTab = tabIndex;
            document.querySelectorAll(".tab").forEach((el, i) => {
                if (i === tabIndex) el.classList.add("tab-active");
                else el.classList.remove("tab-active");
            });
            renderCurrentTab();
        }

        // ==================== SHARED INPUT STYLE ====================
        const inp = "bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 w-full focus:outline-none focus:border-rose-500 text-zinc-100";
        const btn = (color) => `w-full h-12 ${color} hover:opacity-90 rounded-3xl font-medium transition-opacity`;
        const smBtn = (color) => `px-6 h-11 ${color} hover:opacity-90 rounded-3xl font-medium transition-opacity text-sm`;

        // ==================== TAB RENDERS ====================
        function renderCurrentTab() {
            const content = document.getElementById("content");
            const title = document.getElementById("page-title");

            const tabs = [
                // 0 ─ Auth
                () => {
                    title.textContent = "Authentification";
                    return `
                    <div class="max-w-3xl mx-auto">
                        <div class="grid grid-cols-2 gap-8">
                            <!-- Register -->
                            <div class="bg-zinc-900 rounded-3xl p-8 space-y-4">
                                <h2 class="text-lg font-semibold flex items-center gap-2"><i class="fa-solid fa-user-plus text-rose-400"></i> Inscription</h2>
                                <p class="text-xs text-zinc-500">POST /auth/register</p>
                                <input id="reg-name" placeholder="Nom complet" class="${inp}">
                                <input id="reg-email" type="email" placeholder="Email" class="${inp}">
                                <input id="reg-password" type="password" placeholder="Mot de passe" class="${inp}">
                                <input id="reg-tel" type="tel" placeholder="Téléphone (+237...)" class="${inp}">
                                <select id="reg-role" class="${inp}">
                                    <option value="">Rôle par défaut (USER)</option>
                                    <option value="ADMIN">ADMIN</option>
                                    <option value="USER">USER</option>
                                    <option value="CUSTOMER">CUSTOMER</option>
                                    <option value="PARTNER">PARTNER</option>
                                    <option value="GUEST">GUEST</option>
                                </select>
                                <div>
                                    <label class="text-xs text-zinc-400 block mb-2">Photo de profil (optionnel — image/*)</label>
                                    <input type="file" id="reg-image" accept="image/*" class="block w-full text-sm text-zinc-400
                                        file:mr-4 file:py-2 file:px-5 file:rounded-2xl file:border-0
                                        file:text-sm file:font-medium file:bg-rose-600 file:text-white">
                                </div>
                                <button onclick="handleRegister()" class="${btn('bg-rose-600')}">Créer le compte</button>
                            </div>

                            <!-- Login + Refresh -->
                            <div class="space-y-6">
                                <div class="bg-zinc-900 rounded-3xl p-8 space-y-4">
                                    <h2 class="text-lg font-semibold flex items-center gap-2"><i class="fa-solid fa-right-to-bracket text-emerald-400"></i> Connexion</h2>
                                    <p class="text-xs text-zinc-500">POST /auth/login</p>
                                    <input id="login-email" type="email" value="alice@example.com" placeholder="Email" class="${inp}">
                                    <input id="login-password" type="password" value="secret123" placeholder="Mot de passe" class="${inp}">
                                    <button onclick="handleLogin()" class="${btn('bg-emerald-600')}">Se connecter</button>
                                </div>

                                <div class="bg-zinc-900 rounded-3xl p-8 space-y-4">
                                    <h2 class="text-lg font-semibold flex items-center gap-2"><i class="fa-solid fa-rotate text-amber-400"></i> Rafraîchir le token</h2>
                                    <p class="text-xs text-zinc-500">POST /auth/refresh</p>
                                    <input id="refresh-token-input" placeholder="refreshToken (auto si connecté)" class="${inp}">
                                    <button onclick="handleRefresh()" class="${btn('bg-amber-500')}">Rafraîchir</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                },

                // 1 ─ Users
                () => {
                    title.textContent = "Gestion des Utilisateurs";
                    return `
                    <div class="max-w-5xl mx-auto space-y-6">
                        <!-- Quick actions -->
                        <div class="grid grid-cols-3 gap-4">
                            <button onclick="getProfile()" class="bg-zinc-900 hover:bg-zinc-800 rounded-3xl px-6 py-5 text-left">
                                <i class="fa-solid fa-id-card text-xl mb-2 text-rose-400 block"></i>
                                <div class="font-medium text-sm">Mon profil</div>
                                <div class="text-xs text-zinc-500">GET /api/adminuser/get-profile</div>
                            </button>
                            <button onclick="getAllUsers()" class="bg-zinc-900 hover:bg-zinc-800 rounded-3xl px-6 py-5 text-left">
                                <i class="fa-solid fa-users text-xl mb-2 text-sky-400 block"></i>
                                <div class="font-medium text-sm">Tous les utilisateurs</div>
                                <div class="text-xs text-zinc-500">GET /api/admin/get-all-users</div>
                            </button>
                            <button onclick="greetings()" class="bg-zinc-900 hover:bg-zinc-800 rounded-3xl px-6 py-5 text-left">
                                <i class="fa-solid fa-heart-pulse text-xl mb-2 text-emerald-400 block"></i>
                                <div class="font-medium text-sm">Health check</div>
                                <div class="text-xs text-zinc-500">GET /api/v0/product/greetings</div>
                            </button>
                        </div>

                        <div class="grid grid-cols-2 gap-6">
                            <!-- Get by ID -->
                            <div class="bg-zinc-900 rounded-3xl p-6 space-y-4">
                                <h3 class="font-medium flex items-center gap-2"><i class="fa-solid fa-magnifying-glass text-sky-400"></i> Chercher un utilisateur par ID</h3>
                                <p class="text-xs text-zinc-500">GET /api/user/get-users/{userId} — ADMIN</p>
                                <input id="user-id-input" type="number" value="1" placeholder="userId" class="${inp}">
                                <button onclick="getUserById()" class="${btn('bg-sky-700')}">Chercher</button>
                            </div>

                            <!-- Get by role -->
                            <div class="bg-zinc-900 rounded-3xl p-6 space-y-4">
                                <h3 class="font-medium flex items-center gap-2"><i class="fa-solid fa-filter text-violet-400"></i> Utilisateurs par rôle</h3>
                                <p class="text-xs text-zinc-500">GET /api/admin/users/{role} — ADMIN</p>
                                <select id="filter-role" class="${inp}">
                                    <option value="ADMIN">ADMIN</option>
                                    <option value="USER" selected>USER</option>
                                    <option value="CUSTOMER">CUSTOMER</option>
                                    <option value="PARTNER">PARTNER</option>
                                    <option value="GUEST">GUEST</option>
                                </select>
                                <button onclick="getUsersByRole()" class="${btn('bg-violet-600')}">Filtrer</button>
                            </div>

                            <!-- Delete user -->
                            <div class="bg-zinc-900 rounded-3xl p-6 space-y-4">
                                <h3 class="font-medium flex items-center gap-2"><i class="fa-solid fa-trash text-rose-400"></i> Supprimer un utilisateur</h3>
                                <p class="text-xs text-zinc-500">DELETE /api/admin/delete/{userId} — ADMIN</p>
                                <input id="delete-user-id" type="number" placeholder="userId à supprimer" class="${inp}">
                                <button onclick="deleteUser()" class="${btn('bg-rose-700')}">Supprimer</button>
                            </div>

                            <!-- Update profile -->
                            <div class="bg-zinc-900 rounded-3xl p-6 space-y-4">
                                <h3 class="font-medium flex items-center gap-2"><i class="fa-solid fa-pen-to-square text-amber-400"></i> Modifier mon profil</h3>
                                <p class="text-xs text-zinc-500">PUT /api/user/update — champs optionnels</p>
                                <input id="upd-name" placeholder="Nouveau nom (optionnel)" class="${inp}">
                                <input id="upd-email" type="email" placeholder="Nouvel email (optionnel)" class="${inp}">
                                <input id="upd-password" type="password" placeholder="Nouveau mot de passe (optionnel)" class="${inp}">
                                <input id="upd-tel" placeholder="Nouveau téléphone (optionnel)" class="${inp}">
                                <select id="upd-role" class="${inp}">
                                    <option value="">Rôle inchangé</option>
                                    <option value="ADMIN">ADMIN</option>
                                    <option value="USER">USER</option>
                                    <option value="CUSTOMER">CUSTOMER</option>
                                    <option value="PARTNER">PARTNER</option>
                                    <option value="GUEST">GUEST</option>
                                </select>
                                <div>
                                    <label class="text-xs text-zinc-400 block mb-1">Nouvelle photo (optionnel)</label>
                                    <input type="file" id="upd-file" accept="image/*" class="text-sm text-zinc-400
                                        file:mr-3 file:py-2 file:px-4 file:rounded-2xl file:border-0
                                        file:text-xs file:font-medium file:bg-amber-500 file:text-white">
                                </div>
                                <button onclick="updateProfile()" class="${btn('bg-amber-500')}">Mettre à jour</button>
                            </div>
                        </div>
                    </div>`;
                },

                // 2 ─ Produits
                () => {
                    title.textContent = "Produits";
                    return `
                    <div class="max-w-5xl mx-auto space-y-6">
                        <!-- Create product -->
                        <div class="bg-zinc-900 rounded-3xl p-8">
                            <h3 class="font-medium mb-4 flex items-center gap-2"><i class="fa-solid fa-plus text-emerald-400"></i> Créer un produit</h3>
                            <p class="text-xs text-zinc-500 mb-4">POST /api/v0/product/newProduct</p>
                            <div class="grid grid-cols-2 gap-4">
                                <input id="prod-name" placeholder="Nom du produit *" class="${inp} col-span-2">
                                <input id="prod-unitprice" type="number" step="0.01" value="10" placeholder="Prix d'achat (UnitPrice) *" class="${inp}">
                                <input id="prod-soldprice" type="number" step="0.01" value="15" placeholder="Prix de vente (SoldPrice) *" class="${inp}">
                                <input id="prod-qty" type="number" value="20" placeholder="Quantité (ProdQty) *" class="${inp}">
                                <input id="prod-category" placeholder="Catégorie (ex: Bags) *" class="${inp}">
                                <textarea id="prod-desc" rows="2" placeholder="Description *" class="${inp} col-span-2"></textarea>
                                <input id="prod-country" placeholder="Pays séparés par virgule (ex: Japan, France) *" class="${inp} col-span-2">
                                <div class="col-span-2">
                                    <label class="block text-xs text-zinc-400 mb-2">Images du produit (optionnel — image/*)</label>
                                    <input type="file" id="prod-images" multiple accept="image/*" class="text-sm text-zinc-400
                                        file:mr-3 file:py-2 file:px-4 file:rounded-2xl file:border-0
                                        file:text-xs file:font-medium file:bg-emerald-600 file:text-white">
                                </div>
                                <button onclick="createProduct()" class="${btn('bg-emerald-600')} col-span-2">Créer le produit</button>
                            </div>
                        </div>

                        <!-- Update product -->
                        <div class="bg-zinc-900 rounded-3xl p-8">
                            <h3 class="font-medium mb-4 flex items-center gap-2"><i class="fa-solid fa-pen text-amber-400"></i> Modifier un produit</h3>
                            <p class="text-xs text-zinc-500 mb-4">PUT /api/v0/product/updateProduct/{idProd} — champs optionnels</p>
                            <div class="grid grid-cols-2 gap-4">
                                <input id="upd-prod-id" type="number" value="1" placeholder="idProd *" class="${inp} col-span-2">
                                <input id="upd-prod-name" placeholder="Nouveau nom (optionnel)" class="${inp}">
                                <input id="upd-prod-unitprice" type="number" step="0.01" placeholder="Nouveau prix d'achat" class="${inp}">

            const manual = document.getElementById("refresh-token-input") &&
                           document.getElementById("refresh-token-input").value.trim();
            const token = manual || currentRefreshToken;
            if (!token) return showResponse({ error: "Aucun refreshToken disponible" }, 400, 0, "POST");
            const { data } = await apiCall("/auth/refresh", {
                method: "POST",

            const id = document.getElementById("get-vente-id").value;
            await apiCall(`/api/v0/vente/${id}`);
        }

        async function searchVenteByDate() {
            const date = document.getElementById("search-vente-date").value;
            if (!date) return showResponse({ error: "Sélectionnez une date" }, 400, 0, "GET");
            await apiCall(`/api/v0/vente/search?date=${date}`);
        }

        // ==================== INIT ====================
        function init() {
            tailwind.config = { content: [], theme: { extend: {} } };
            updateTokenUI();
            renderCurrentTab();
            console.log("%c✅ Nipponhub API Tester v2.0 chargé !", "color:#e11d48; font-size:13px");
            console.log("Base URL :", BASE_URL);
        }

        window.onload = init;
    </script>
