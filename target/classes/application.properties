# ── APPLICATION ──────────────────────────────────────────────────────
spring.application.name=nipponhub

# MySQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nipponhub_DB}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#PostgresSQL from SuperBase


# Uncomment and set the following for development purposes:
# DB_NAME=my_database_name
# DB_USER=${DB_USER}
# DB_PASSWORD=${DB_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
# spring.jpa.hibernate.ddl-auto=create-drop

# ── MONGODB ──────────────────────────────────────────────────────────
# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/nipponhubfiles}
# spring.data.mongodb.uri=${MONGO_URI:mongodb+srv://zeufacktameze_db_user:qLO6C4ZllnYQwPZF@nipponhubfiles.zxx7rmv.mongodb.net/?appName=nipponhubfiles}
# spring.data.mongodb.database=${MONGO_DB:nipponhubfiles}
# spring.data.mongodb.username=${MONGO_USERNAME:zeufacktameze_db_user}
# spring.data.mongodb.password=${MONGO_PASSWORD:qLO6C4ZllnYQwPZF}
spring.data.mongodb.auto-index-creation=true   

# ── FILE UPLOAD ──────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# ── SECURITY ─────────────────────────────────────────────────────────
spring.security.user.name=admin
spring.security.user.password=admin
# Valid Base64-encoded 32-byte secret (for development only, use strong secret for production)
app.jwt.secret=${JWT_SECRET:dHlCbUUyOUpTV0RKTXpsNGFGQkJiRmRCTUUxRGEwUnZSSGRSYkZseVkyUkE=}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
app.jwt.blacklist.enabled=true

# ── SPRINGDOC / SWAGGER ──────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=true

# HikariCP Connection Pool (Production)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=NipponHubPool

# ── OTHER ────────────────────────────────────────────────────────────
spring.thymeleaf.check-template-location=false
spring.jackson.default-property-inclusion=non_null
server.error.include-message=always

app.base-url=http://localhost:8080

# Logging
logging.level.root=WARN
logging.level.com.nipponhub.nipponhubv0=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/nipponhub.log


