# ── APPLICATION ──────────────────────────────────────────────────────
spring.application.name=nipponhub

# ── MYSQL (AWS RDS) ───────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / HIBERNATE ───────────────────────────────────────────────────
# "validate" en prod : ne modifie jamais le schéma automatiquement
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── MONGODB ATLAS ─────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=${MONGO_DB:nipponhubfiles}
# ⚠️ Désactiver en prod — les index doivent être gérés manuellement
spring.data.mongodb.auto-index-creation=false

# ── FILE UPLOAD ───────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# ── SECURITY ──────────────────────────────────────────────────────────
# Supprimer les credentials Spring par défaut si tu as Spring Security custom
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
app.jwt.blacklist.enabled=true

# ── HIKARICP (adapté Free Tier) ───────────────────────────────────────
spring.datasource.hikari.pool-name=NipponHubPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# ── SWAGGER / SPRINGDOC ───────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
# Désactiver Swagger en production !
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# ── CORS ──────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ── ERREURS ───────────────────────────────────────────────────────────
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ── THYMELEAF / JACKSON ───────────────────────────────────────────────
spring.thymeleaf.check-template-location=false
spring.jackson.default-property-inclusion=non_null

# ── LOGGING ───────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.nipponhub.nipponhubv0=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/nipponhub.log

# ── APP ───────────────────────────────────────────────────────────────
app.base-url=${APP_BASE_URL:http://localhost:8080}