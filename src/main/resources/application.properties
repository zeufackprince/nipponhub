# ── APPLICATION ──────────────────────────────────────────────────────
spring.application.name=nipponhub

# ── MYSQL ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/nipponhub_DB
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / HIBERNATE ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── MONGODB ──────────────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/nipponhubfiles
# spring.data.mongodb.database=nipponhubfiles-NipponHub1712     

# ── FILE UPLOAD ──────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=50MB

# ── SECURITY ─────────────────────────────────────────────────────────
spring.security.user.name=admin
spring.security.user.password=admin

# ── SPRINGDOC / SWAGGER ──────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=true

# ── OTHER ────────────────────────────────────────────────────────────
spring.thymeleaf.check-template-location=false
spring.jackson.default-property-inclusion=non_null
server.error.include-message=always

# ── REMOVE THIS once circular dependency is found and fixed ──────────
# spring.main.allow-circular-references=true

app.base-url=http://localhost:8080