<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nipponhub API Tester v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }

</head>
<body class="bg-zinc-950 text-zinc-100">

                <i class="fa-solid fa-terminal text-zinc-500"></i> Réponse API
            </div>
            <div class="flex items-center gap-3">
                <div id="resp-method" class="text-[10px] font-mono px-2 py-0.5 rounded"></div>
                <div id="resp-status"></div>
                <div id="resp-time" class="text-[10px] text-zinc-500"></div>
                <button onclick="clearResp()" class="text-zinc-600 hover:text-zinc-400 text-xs">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>
        <div id="resp-panel" class="flex-1 overflow-auto p-4">
            <div id="resp-empty" class="h-full flex flex-col items-center justify-center text-center text-zinc-700">
                <i class="fa-solid fa-paper-plane text-4xl mb-3 opacity-40"></i>
                <p class="text-sm">Aucune requête</p>
            </div>
            <pre id="resp-json" class="hidden response-json text-xs text-emerald-300 whitespace-pre-wrap break-all"></pre>
        </div>
    </aside>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════
const BASE = "http://localhost:8080";
let token   = localStorage.getItem("nh_token")   || null;
let refresh = localStorage.getItem("nh_refresh") || null;
let me      = null;

const inp = (extra="") =>
    `bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2.5 w-full text-sm text-zinc-100 focus:outline-none focus:border-rose-500 ${extra}`;
const btn = (color, extra="") =>
    `${color} hover:opacity-80 rounded-xl px-4 py-2.5 text-sm font-medium transition-opacity ${extra}`;
const card = (extra="") => `bg-zinc-900 rounded-2xl p-5 ${extra}`;
const label = (txt) => `<div class="text-[11px] text-zinc-500 mb-1">${txt}</div>`;
const badge = (method) => {
    const cls = {GET:'method-get',POST:'method-post',PUT:'method-put',DELETE:'method-delete'}[method]||'';
    return `<span class="text-[10px] font-mono px-2 py-0.5 rounded ${cls}">${method}</span>`;
};
const endpoint = (method, path) =>
    `<div class="flex items-center gap-2 mb-3">${badge(method)}<code class="text-xs text-zinc-400">${path}</code></div>`;

// ══════════════════════════════════════════════════════════
//  TOKEN / AUTH UI
// ══════════════════════════════════════════════════════════
function updateTokenUI() {
    const dot  = document.getElementById("token-dot");
    const text = document.getElementById("token-text");
    const info = document.getElementById("user-info");
    const ts   = document.getElementById("token-short");
    if (token) {
        dot.classList.replace("bg-zinc-600","bg-emerald-400");
        text.textContent = "Connecté"; text.classList.replace("text-zinc-400","text-emerald-400");
        ts.textContent = token.substring(0,14)+"…";
        info.classList.remove("hidden");
        if (me) {
            document.getElementById("user-name").textContent = me.name || me.email || "";
            document.getElementById("user-role").textContent = me.role || "";
        }
    } else {
        dot.classList.replace("bg-emerald-400","bg-zinc-600");
        text.textContent = "Non connecté"; text.classList.replace("text-emerald-400","text-zinc-400");
        ts.textContent = "—"; info.classList.add("hidden");
    }
}
function saveToken(t, r, user) {
    token = t; refresh = r; if(user) me = user;
    localStorage.setItem("nh_token", t);
    if(r) localStorage.setItem("nh_refresh", r);
    updateTokenUI();
}
function logout() {
    token = refresh = me = null;
    localStorage.removeItem("nh_token"); localStorage.removeItem("nh_refresh");
    updateTokenUI(); go(0); showResp({message:"Déconnecté"}, 200, 0, "LOCAL");
}
function copyToken() {
    if (!token) return;
    navigator.clipboard.writeText(token).then(() => {
        const el = document.getElementById("token-short");
        const old = el.textContent;
        el.textContent = "Copié !";
        setTimeout(() => el.textContent = old, 1500);
    });
}

// ══════════════════════════════════════════════════════════
//  RESPONSE PANEL
// ══════════════════════════════════════════════════════════
function showResp(data, status, ms, method="") {
    document.getElementById("resp-empty").classList.add("hidden");
    const j = document.getElementById("resp-json");
    j.classList.remove("hidden");
    j.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);

    const ok = status >= 200 && status < 300;
    document.getElementById("resp-status").innerHTML =
        `<span class="text-[11px] font-mono px-2 py-0.5 rounded ${ok?'bg-emerald-500/20 text-emerald-400':'bg-rose-500/20 text-rose-400'}">${status||"ERR"}</span>`;
    document.getElementById("resp-time").textContent   = ms ? ms+"ms" : "";
    const mEl = document.getElementById("resp-method");
    mEl.textContent = method;
    mEl.className = `text-[10px] font-mono px-2 py-0.5 rounded ${{'GET':'method-get','POST':'method-post','PUT':'method-put','DELETE':'method-delete'}[method]||''}`;
}
function clearResp() {
    document.getElementById("resp-empty").classList.remove("hidden");
    document.getElementById("resp-json").classList.add("hidden");
    document.getElementById("resp-status").innerHTML="";
    document.getElementById("resp-time").textContent="";
}

// ══════════════════════════════════════════════════════════
//  API CALL
// ══════════════════════════════════════════════════════════
async function api(path, opts={}) {
    const start = Date.now();
    const method = opts.method || "GET";
    const headers = { ...opts.headers };
    const isPublic = path.startsWith("/auth/") || path.startsWith("/file/");
    if (token && !isPublic) headers["Authorization"] = `Bearer ${token}`;
    if (!(opts.body instanceof FormData)) headers["Content-Type"] = "application/json";

    try {
        const res = await fetch(BASE + path, {
            method,
            headers: Object.keys(headers).length ? headers : undefined,
            body: opts.body
        });
        let data;
        const ct = res.headers.get("content-type")||"";
        if (ct.includes("application/json")) data = await res.json();
        else if (ct.includes("image/")) data = {message:"Image (binary)", url: BASE+path};
        else data = await res.text();

        const ms = Date.now()-start;
        showResp(data, res.status, ms, method);
        if (res.status === 401 && refresh && path !== "/auth/refresh") await doRefresh();
        return { data, status: res.status };
    } catch(e) {
        showResp({error: e.message}, 0, Date.now()-start, method);
        return { error: e.message };
    }
}
async function doRefresh() {
    const { data } = await api("/auth/refresh", {method:"POST", body: JSON.stringify({token: refresh})});
    if (data?.token) saveToken(data.token, data.refreshToken||refresh);
}

// ══════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════
const TITLES = [
    "Authentification","Catalogue (Public)","Mes Commandes","Mon Profil",
    "Commandes — Admin","Produits","Catégories & Pays","Achats","Ventes directes",
    "Gestion Utilisateurs","Fichiers & Images","Activité Produits"
];
function go(i) {
    document.querySelectorAll(".tab").forEach((el,j) => {
        el.classList.toggle("tab-active", i===j);
    });
    document.getElementById("page-title").textContent = TITLES[i];
    document.getElementById("content").innerHTML = TABS[i]();
    if (i===4 || i===2) {
        const d = document.getElementById("commande-date-input") || document.getElementById("vente-search-date");
        if(d) d.value = new Date().toISOString().slice(0,10);
    }
}

// ══════════════════════════════════════════════════════════
//  HANDLERS — Auth
// ══════════════════════════════════════════════════════════
async function doRegister() {
    const fd = new FormData();
    ["reg-name","reg-email","reg-password","reg-tel"].forEach(id => {
        const v = val(id); if(v) fd.append({
            "reg-name":"name","reg-email":"email",
            "reg-password":"password","reg-tel":"telephone"}[id], v);
    });
    // role is NOT sent — server always assigns CLIENT
    const img = file("reg-img"); if(img) fd.append("profileImg", img);
    const {data} = await api("/auth/register", {method:"POST", body:fd});
    if(data?.userId) { me = data; updateTokenUI(); }
}
async function doLogin() {
    const {data} = await api("/auth/login", {method:"POST",
        body: JSON.stringify({email:val("login-email"), password:val("login-password")})});
    if(data?.token) saveToken(data.token, data.refreshToken, data);
}
async function doRefreshManual() {
    const t = val("manual-refresh") || refresh;
    if(!t) return showResp({error:"Aucun refresh token"}, 400, 0, "POST");
    const {data} = await api("/auth/refresh", {method:"POST", body: JSON.stringify({token:t})});
    if(data?.token) saveToken(data.token, data.refreshToken||refresh);
}

// ══════════════════════════════════════════════════════════
//  HANDLERS — Catalogue (public)
// ══════════════════════════════════════════════════════════
async function getAllProducts()     { await api("/api/v0/product/all"); }
async function getProductById()     { await api(`/api/v0/product/${val("pub-prod-id")}`); }
async function searchByName()       { await api(`/api/v0/product/searchByName?prodName=${enc(val("pub-search-name"))}`); }
async function searchByCategory()   { await api(`/api/v0/product/searchByCategory?category=${enc(val("pub-search-cat"))}`); }
async function searchByCountry()    { await api(`/api/v0/product/searchByCountry?country=${enc(val("pub-search-country"))}`); }
async function getAllCategoriesPub() { await api("/api/v0/categories/getAllCategories"); }
async function getAllCountriesPub()  { await api("/api/v0/country/getAllCountries"); }
async function healthCheck()        { await api("/api/v0/product/greetings"); }

// ══════════════════════════════════════════════════════════
//  HANDLERS — Client: Commandes
// ══════════════════════════════════════════════════════════
async function placeCommande() {
    const raw = val("commande-json");
    let body;
    try { body = JSON.parse(raw); } catch { return showResp({error:"JSON invalide"}, 400, 0, "POST"); }
    body.note = val("commande-note") || undefined;
    await api("/api/v0/commande/new", {method:"POST", body: JSON.stringify(body)});
}
async function getMyOrders()  { await api("/api/v0/commande/my-orders"); }
async function getMyOrderById() { await api(`/api/v0/commande/my-orders/${val("my-order-id")}`); }

// ══════════════════════════════════════════════════════════
//  HANDLERS — Client: Profil
// ══════════════════════════════════════════════════════════
async function getMyProfile() { await api("/api/adminuser/get-profile"); }
async function updateMyProfile() {
    const fd = new FormData();
    [["upd-name","name"],["upd-email","email"],["upd-password","password"],["upd-tel","telephone"]]
        .forEach(([id,key]) => { const v=val(id); if(v) fd.append(key, v); });
    const f = file("upd-img"); if(f) fd.append("file", f);
    await api("/api/user/update", {method:"PUT", body:fd});
}

// ══════════════════════════════════════════════════════════
//  HANDLERS — Admin: Commandes
// ══════════════════════════════════════════════════════════
async function adminGetAllCommandes()  { await api("/api/v0/commande/all"); }
async function adminGetByStatus() {
    const s = val("filter-status"); if(!s) return;
    await api(`/api/v0/commande/status/${s}`);
}
async function adminGetCommande()   { await api(`/api/v0/commande/${val("admin-cmd-id")}`); }
async function adminConfirm()       { await api(`/api/v0/commande/${val("admin-cmd-action-id")}/confirm`, {method:"PUT"}); }
async function adminDeliver()       { await api(`/api/v0/commande/${val("admin-cmd-action-id")}/deliver`, {method:"PUT"}); }
async function adminCancel()        { await api(`/api/v0/commande/${val("admin-cmd-action-id")}/cancel`, {method:"PUT"}); }

// ══════════════════════════════════════════════════════════
//  HANDLERS — Admin: Produits
// ══════════════════════════════════════════════════════════
async function createProduct() {
    const fd = new FormData();
    [["prod-name","ProdName"],["prod-unitprice","UnitPrice"],["prod-soldprice","SoldPrice"],
     ["prod-qty","ProdQty"],["prod-desc","prodDescription"],["prod-category","category"]]
        .forEach(([id,k]) => { const v=val(id); if(v) fd.append(k,v); });
    val("prod-countries").split(",").map(s=>s.trim()).filter(Boolean).forEach(c=>fd.append("Country",c));
    for(const f of files("prod-imgs")) fd.append("ProdUrl", f);
    await api("/api/v0/product/newProduct", {method:"POST", body:fd});
}
async function updateProduct() {
    const id = val("upd-prod-id"); if(!id) return;
    const fd = new FormData();
    [["upd-prod-name","ProdName"],["upd-prod-up","UnitPrice"],["upd-prod-sp","SoldPrice"],
     ["upd-prod-qty","ProdQty"],["upd-prod-desc","prodDescription"],["upd-prod-cat","category"]]
        .forEach(([id2,k]) => { const v=val(id2); if(v) fd.append(k,v); });
    const c = val("upd-prod-countries");
    if(c) c.split(",").map(s=>s.trim()).filter(Boolean).forEach(ct=>fd.append("Country",ct));
    for(const f of files("upd-prod-imgs")) fd.append("ProdUrl", f);
    await api(`/api/v0/product/updateProduct/${id}`, {method:"PUT", body:fd});
}
async function deleteProduct() {
    const id = val("del-prod-id"); if(!id) return;
    if(!confirm(`Supprimer le produit #${id} ?`)) return;
    await api(`/api/v0/product/${id}`, {method:"DELETE"});
}
async function listAllProductsAdmin() { await api("/api/v0/product/all"); }

async function adminCreateUser() {
    const fd = new FormData();
    [["adm-usr-name","name"],["adm-usr-email","email"],["adm-usr-pass","password"],["adm-usr-tel","telephone"]]
        .forEach(([id,k]) => { const v=val(id); if(v) fd.append(k,v); });
    const r = val("adm-usr-role"); if(r) fd.append("role",r);
    const f = file("adm-usr-img"); if(f) fd.append("profileImg",f);
    await api("/api/admin/create-user", {method:"POST", body:fd});
}
async function adminGetAllUsers()    { await api("/api/admin/get-all-users"); }
async function adminGetUsersByRole() { await api(`/api/admin/users/${val("filter-user-role")}`); }
async function adminGetUserById()    { await api(`/api/admin/users/id/${val("get-user-id")}`); }
async function adminDeleteUser() {
    const id = val("del-user-id"); if(!id) return;
    if(!confirm(`Supprimer l'utilisateur #${id} ?`)) return;
    await api(`/api/admin/delete/${id}`, {method:"DELETE"});
}
async function adminChangeRole() {
    await api(`/api/admin/users/${val("role-change-id")}/role?role=${val("role-change-val")}`, {method:"PUT"});
}

// ══════════════════════════════════════════════════════════
//  HANDLERS — Fichiers
// ══════════════════════════════════════════════════════════
async function uploadSingle() {
    const f = file("single-file"); if(!f) return showResp({error:"Choisir une image"}, 400, 0,"POST");
    const fd = new FormData(); fd.append("file", f);
    const pid = val("single-pid"); if(pid) fd.append("productId", pid);
    await api("/file/upload", {method:"POST", body:fd});
}
async function uploadBatch() {
    const fs_ = files("batch-files"); if(!fs_.length) return showResp({error:"Choisir des images"}, 400, 0,"POST");
    const fd = new FormData();
    for(const f of fs_) fd.append("files", f);
    const pid = val("batch-pid"); if(pid) fd.append("productId", pid);
    await api("/file/upload/batch", {method:"POST", body:fd});
}
async function viewFile()        { const id=val("file-id"); if(id) window.open(`${BASE}/file/${id}`,"_blank"); }
async function getFileMeta()     { await api(`/file/metadata/${val("file-id")}`); }
async function deleteFile()      {
    const id=val("file-id"); if(!id) return;
    if(!confirm(`Supprimer le fichier ${id} ?`)) return;
    await api(`/file/${id}`, {method:"DELETE"});
}
async function getFilesByProduct() { await api(`/file/product/${val("files-prod-id")}`); }

                <div class="col-span-2">${label("Rôle")}
                    <select id="adm-usr-role" class="${inp()}">
                        <option value="CLIENT">CLIENT</option>
                        <option value="ADMIN">ADMIN</option>
                        <option value="OWNER">OWNER</option>
                        <option value="PARTNER">PARTNER</option>
                        <option value="GUEST">GUEST</option>
                    </select>
                </div>
                <div class="col-span-2">${label("Photo")}<input type="file" id="adm-usr-img" accept="image/*" class="text-xs text-zinc-400 file:mr-2 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:bg-amber-500 file:text-white"></div>
                <button onclick="adminCreateUser()" class="${btn('bg-amber-500 text-white','col-span-2 w-full')}">Créer utilisateur</button>
            </div>
        </div>
        <div class="${card('grid grid-cols-2 gap-4')}">
            <div>
                ${endpoint("GET","/api/admin/get-all-users")}
                <button onclick="adminGetAllUsers()" class="${btn('bg-zinc-700 text-white','w-full')}">Tous les utilisateurs</button>
            </div>
            <div>
                ${endpoint("GET","/api/admin/users/{role}")}
                <select id="filter-user-role" class="${inp('mb-2')}">
                    <option value="CLIENT">CLIENT</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="OWNER">OWNER</option>
                    <option value="PARTNER">PARTNER</option>
                    <option value="GUEST">GUEST</option>
                </select>
                <button onclick="adminGetUsersByRole()" class="${btn('bg-zinc-700 text-white','w-full')}">Filtrer par rôle</button>
            </div>
            <div>
                ${endpoint("GET","/api/admin/users/id/{id}")}
                ${label("UserID")}<input id="get-user-id" type="number" value="1" class="${inp('mb-2')}">
                <button onclick="adminGetUserById()" class="${btn('bg-sky-700 text-white','w-full')}">Par ID</button>
            </div>
            <div>
                ${endpoint("DELETE","/api/admin/delete/{id}")}
                ${label("UserID à supprimer")}<input id="del-user-id" type="number" class="${inp('mb-2')}">
                <button onclick="adminDeleteUser()" class="${btn('bg-rose-700 text-white','w-full')}"><i class="fa-solid fa-trash mr-1"></i>Supprimer</button>
            </div>
            <div class="col-span-2">
                ${endpoint("PUT","/api/admin/users/{id}/role")}
                <div class="flex gap-3">
                    <div class="flex-1">${label("UserID")}<input id="role-change-id" type="number" class="${inp()}"></div>
                    <div class="flex-1">${label("Nouveau rôle")}
                        <select id="role-change-val" class="${inp()}">
                            <option value="CLIENT">CLIENT</option>
                            <option value="ADMIN">ADMIN</option>
                            <option value="OWNER">OWNER</option>
                            <option value="PARTNER">PARTNER</option>
                            <option value="GUEST">GUEST</option>
                        </select>
                    </div>
                </div>
                <button onclick="adminChangeRole()" class="${btn('bg-amber-500 text-white','w-full mt-3')}">Changer le rôle</button>
            </div>
        </div>
    </div>`,

    // 10 — Fichiers
    () => `<div class="max-w-4xl mx-auto space-y-4">
        <div class="${card('grid grid-cols-2 gap-4')}">
            <div>
                ${endpoint("POST","/file/upload")}
                <input type="file" id="single-file" accept="image/*" class="text-xs text-zinc-400 file:mr-2 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:bg-amber-500 file:text-white mb-2">
                ${label("productId (opt)")}<input id="single-pid" class="${inp('mb-2')}">
                <button onclick="uploadSingle()" class="${btn('bg-amber-500 text-white','w-full')}">Upload simple</button>
            </div>
            <div>
                ${endpoint("POST","/file/upload/batch")}
                <input type="file" id="batch-files" multiple accept="image/*" class="text-xs text-zinc-400 file:mr-2 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:bg-amber-500 file:text-white mb-2">
                ${label("productId (opt)")}<input id="batch-pid" class="${inp('mb-2')}">
                <button onclick="uploadBatch()" class="${btn('bg-amber-500 text-white','w-full')}">Upload multiple</button>
            </div>
        </div>
        <div class="${card()}">
            ${label("fileId (hex ObjectId)")}
            <input id="file-id" class="${inp('mb-3')}" placeholder="6500f7b8a4440f1aaad12f65">
            <div class="flex gap-2">
                <button onclick="viewFile()"    class="${btn('bg-emerald-600 text-white','flex-1')}"><i class="fa-solid fa-eye mr-1"></i>Voir</button>
                <button onclick="getFileMeta()" class="${btn('bg-sky-700 text-white','flex-1')}"><i class="fa-solid fa-info mr-1"></i>Métadonnées</button>
                <button onclick="deleteFile()"  class="${btn('bg-rose-700 text-white','flex-1')}"><i class="fa-solid fa-trash mr-1"></i>Supprimer</button>
            </div>
        </div>
        <div class="${card()}">
            ${endpoint("GET","/file/product/{productId}")}
            ${label("productId")}<input id="files-prod-id" type="number" value="1" class="${inp('mb-3')}">
            <button onclick="getFilesByProduct()" class="${btn('bg-violet-600 text-white','w-full')}">Fichiers du produit</button>
        </div>
    </div>`,

    // 11 — Activité Produits
    () => `<div class="max-w-3xl mx-auto space-y-4">
        <div class="${card()}">
            <div class="font-semibold mb-1 flex items-center gap-2"><i class="fa-solid fa-timeline text-rose-400"></i> Audit trail par produit</div>
            ${endpoint("GET","/api/v0/product/{id}/activity")}
            <p class="text-xs text-zinc-500 mb-3">Retourne toutes les actions : CREATED, UPDATED, DELETED, ACHAT, COMMANDE_PLACED, CONFIRMED, DELIVERED, CANCELLED.</p>
            ${label("ID Produit")}<input id="act-prod-id" type="number" value="1" class="${inp('mb-3')}">
            <button onclick="getProductActivity()" class="${btn('bg-rose-600 text-white','w-full')}">Voir l'activité</button>
        </div>
        <div class="${card()}">
            <div class="font-semibold mb-1 flex items-center gap-2"><i class="fa-solid fa-user-clock text-violet-400"></i> Activité par utilisateur</div>
            ${endpoint("GET","/api/v0/product/activity/user?email=")}
            <p class="text-xs text-zinc-500 mb-3">Toutes les actions effectuées par un utilisateur sur n'importe quel produit.</p>
            ${label("Email utilisateur")}<input id="act-user-email" type="email" class="${inp('mb-3')}" placeholder="admin@example.com">
            <button onclick="getActivityByUser()" class="${btn('bg-violet-600 text-white','w-full')}">Voir l'activité</button>
        </div>
    </div>`
];
